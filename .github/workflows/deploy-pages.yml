name: Deploy TestPrep SAT Roadmap to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify deployment files
        run: |
          test -f app/index.html
          test -f app/css/app.css
          test -f app/js/app.js
          test -f app/vendor/pdfjs/pdf.min.js
          test -f app/vendor/pdfjs/pdf.worker.min.js
          echo "GitHub Pages deployment files verified."

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload web application
        uses: actions/upload-pages-artifact@v3
        with:
          path: app

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
